<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcams CNS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a3d62 0%, #1a6b8a 50%, #0f0c29 100%);
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 24px 16px 8px;
        }
        header h1 {
            font-size: 1.6em;
            font-weight: 700;
            background: linear-gradient(90deg, #4fc3f7, #81d4fa, #b3e5fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header .subtitle {
            font-size: 0.85em;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        .back-link {
            position: absolute;
            top: 16px;
            left: 16px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #4fc3f7; }

        .tiles {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 16px;
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 24px 16px;
            border-radius: 14px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 0.92em;
            text-align: center;
            transition: all 0.25s;
            border: 1px solid rgba(255,255,255,0.15);
            min-height: 160px;
            line-height: 1.3;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
            text-shadow: 0 1px 4px rgba(0,0,0,0.7);
        }
        .tile::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            transition: opacity 0.3s;
        }
        .tile:hover {
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.3);
        }
        .tile:hover::before {
            opacity: 0.7;
        }
        .tile:active {
            transform: translateY(1px);
        }

        .tile .icon,
        .tile span,
        .tile .label {
            position: relative;
            z-index: 1;
        }
        .tile .icon {
            font-size: 2em;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .tile .label {
            font-size: 0.85em;
            opacity: 0.85;
            font-weight: 400;
        }

        .tile-webcam {
            background-image: url('img/club-nautic.jpg');
            box-shadow: 0 4px 15px rgba(21,101,192,0.4);
        }
        .tile-webcam::before {
            background: linear-gradient(135deg, rgba(21,101,192,0.6) 0%, rgba(13,71,161,0.75) 100%);
            opacity: 0.8;
        }
        .tile-webcam:hover {
            box-shadow: 0 8px 25px rgba(21,101,192,0.5);
        }

        .tile-calipolis {
            background-image: url('img/calipolis.png');
            box-shadow: 0 4px 15px rgba(0,131,143,0.4);
        }
        .tile-calipolis::before {
            background: linear-gradient(135deg, rgba(0,131,143,0.5) 0%, rgba(0,96,100,0.7) 100%);
            opacity: 0.75;
        }
        .tile-calipolis:hover {
            box-shadow: 0 8px 25px rgba(0,131,143,0.5);
        }

        .tile-youtube {
            background-image: url('img/esglesia-sitges.jpg');
            box-shadow: 0 4px 15px rgba(198,40,40,0.4);
        }
        .tile-youtube::before {
            background: linear-gradient(135deg, rgba(198,40,40,0.5) 0%, rgba(142,0,0,0.7) 100%);
            opacity: 0.75;
        }
        .tile-youtube:hover {
            box-shadow: 0 8px 25px rgba(198,40,40,0.5);
        }

        .tile-meteo {
            background-image: url('img/sailing-wind.jpg');
            box-shadow: 0 4px 15px rgba(46,125,50,0.4);
        }
        .tile-meteo::before {
            background: linear-gradient(135deg, rgba(46,125,50,0.5) 0%, rgba(27,94,32,0.7) 100%);
            opacity: 0.75;
        }
        .tile-meteo:hover {
            box-shadow: 0 8px 25px rgba(46,125,50,0.5);
        }

        footer {
            text-align: center;
            padding: 16px;
            color: rgba(255,255,255,0.2);
            font-size: 0.7em;
        }

        @media (max-width: 480px) {
            header { padding: 18px 12px 4px; }
            header h1 { font-size: 1.3em; }
            .tiles {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                padding: 12px;
            }
            .tile {
                padding: 18px 10px;
                min-height: 130px;
                border-radius: 12px;
                font-size: 0.82em;
            }
            .tile::before {
                border-radius: 12px;
            }
            .tile .icon { font-size: 1.7em; }
            .back-link { top: 10px; left: 10px; font-size: 0.8em; }
        }

        @media (max-width: 340px) {
            .tiles { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<a class="back-link" href="../index.html">&larr; Tornar</a>

<header>
    <h1>Webcams &amp; Estacio Meteo</h1>
    <div class="subtitle">Club Nautic Sitges</div>
</header>

<div class="tiles">
    <a class="tile tile-webcam" href="https://video.nest.com/live/rRaPmgiwSf" target="_blank" rel="noopener">
        <span class="icon">&#128247;</span>
        <span>Webcam Nautic</span>
        <span class="label">En directe</span>
    </a>

    <a class="tile tile-calipolis" href="https://www.hotelcalipolis.com/#webcam" target="_blank" rel="noopener">
        <span class="icon">&#127961;</span>
        <span>Vista Llevant</span>
        <span class="label">Des del Calipolis</span>
    </a>

    <a class="tile tile-youtube" href="https://www.youtube.com/live/lTH4PI3z3rg?si=LsWjx-OtwEsBY731" target="_blank" rel="noopener">
        <span class="icon">&#127909;</span>
        <span>Vista S/SE</span>
        <span class="label">Des d'Esglesia</span>
    </a>

    <a class="tile tile-meteo" href="https://app.weathercloud.net/d1807591580#wind" target="_blank" rel="noopener">
        <span class="icon">&#127782;&#65039;</span>
        <span>Estacio Meteo</span>
        <span class="label">Club Nautic Sitges</span>
    </a>
</div>

<footer>Webcams CNS</footer>

</body>
</html>
