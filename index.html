<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNS Vela - Club Nàutic Sitges</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a1628;
            color: #e8e8e8;
            min-height: 100vh;
        }

        /* Header amb ambient marítim */
        header {
            background: linear-gradient(135deg, #0a3d62 0%, #1a6b8a 40%, #0d47a1 100%);
            text-align: center;
            padding: 28px 16px 20px;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 20px;
            background: #0a1628;
            clip-path: ellipse(55% 100% at 50% 100%);
        }
        header h1 {
            font-size: 1.5em;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #4fc3f7, #81d4fa, #e0f7fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header .subtitle {
            font-size: 0.8em;
            color: rgba(255,255,255,0.55);
            margin-top: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .sail-icons {
            font-size: 1.4em;
            margin-bottom: 6px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .back-link {
            position: absolute;
            top: 14px;
            left: 14px;
            color: rgba(255,255,255,0.45);
            text-decoration: none;
            font-size: 0.8em;
            transition: color 0.2s;
            z-index: 2;
        }
        .back-link:hover { color: #4fc3f7; }

        /* Contingut principal */
        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 12px 14px 24px;
        }

        /* Frames de categoria */
        .category {
            margin-bottom: 18px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(165deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            overflow: hidden;
            backdrop-filter: blur(4px);
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px 0;
        }
        .category-icon {
            font-size: 1.3em;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3));
        }
        .category-title {
            font-size: 0.72em;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-weight: 700;
        }
        .category-title.title-webcam { color: #ef5350; }
        .category-title.title-meteo { color: #66bb6a; }
        .category-title.title-regata { color: #ffb74d; }
        .category-title.title-nautica { color: #4fc3f7; }
        .category-line {
            height: 1px;
            margin: 8px 14px 0;
            border: none;
        }
        .line-webcam { background: linear-gradient(90deg, rgba(239,83,80,0.4), transparent); }
        .line-meteo { background: linear-gradient(90deg, rgba(102,187,106,0.4), transparent); }
        .line-regata { background: linear-gradient(90deg, rgba(255,183,77,0.4), transparent); }
        .line-nautica { background: linear-gradient(90deg, rgba(79,195,247,0.4), transparent); }
        .category-cards {
            padding: 10px 12px 12px;
        }

        /* Grid de cards */
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Card individual */
        .card {
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: #fff;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.25s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(79,195,247,0.3);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .card:active {
            transform: scale(0.97);
        }

        .card-img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .card-name {
            font-size: 0.82em;
            font-weight: 700;
            line-height: 1.2;
        }
        .card-desc {
            font-size: 0.68em;
            color: rgba(255,255,255,0.45);
            line-height: 1.3;
        }
        .card-badge {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 7px;
            border-radius: 6px;
            font-size: 0.58em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: fit-content;
        }
        .badge-live {
            background: rgba(239,83,80,0.25);
            color: #ef5350;
        }
        .badge-meteo {
            background: rgba(76,175,80,0.25);
            color: #66bb6a;
        }
        .badge-regata {
            background: rgba(255,183,77,0.25);
            color: #ffb74d;
        }
        .badge-info {
            background: rgba(79,195,247,0.25);
            color: #4fc3f7;
        }

        /* Card sense imatge (placeholder amb icona) */
        .card-icon-placeholder {
            width: 100%;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2em;
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 100%);
        }

        footer {
            text-align: center;
            padding: 20px 16px;
            color: rgba(255,255,255,0.15);
            font-size: 0.65em;
        }

        /* Mobile optimitzat */
        @media (max-width: 480px) {
            header { padding: 22px 12px 16px; }
            header h1 { font-size: 1.3em; }
            main { padding: 10px 10px 20px; }
            .cards { gap: 8px; }
            .card-img { height: 75px; }
            .card-icon-placeholder { height: 75px; font-size: 1.8em; }
            .card-body { padding: 8px; }
            .card-name { font-size: 0.78em; }
        }

        @media (max-width: 340px) {
            .cards { grid-template-columns: 1fr; }
            .card-img { height: 120px; }
        }

        /* Pantalla gran: 3 columnes */
        @media (min-width: 601px) {
            .cards { grid-template-columns: 1fr 1fr 1fr; }
        }
    </style>
</head>
<body>

<a class="back-link" href="../index.html">&larr; Tornar</a>

    <div class="sail-icons">&#9973; &#127754;</div>
    <h1>CNS Vela Lleugera</h1>

    <!-- METEO -->
    <section class="category">

        </div>

            <a class="card" href="https://app.weathercloud.net/d1807591580#wind">

                    <div class="card-desc">Vent, temp, pressió</div>
