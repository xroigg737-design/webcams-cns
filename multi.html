<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcams en directe - CNS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a1628;
            color: #e8e8e8;
            min-height: 100vh;
        }

        .back-link {
            position: absolute;
            top: 14px; left: 14px;
            color: rgba(255,255,255,0.45);
            text-decoration: none;
            font-size: 0.8em;
            transition: color 0.2s;
            z-index: 2;
        }
        .back-link:hover { color: #4fc3f7; }

        header {
            background: linear-gradient(135deg, #0a3d62 0%, #1a6b8a 40%, #0d47a1 100%);
            text-align: center;
            padding: 20px 16px 16px;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0; right: 0;
            height: 20px;
            background: #0a1628;
            clip-path: ellipse(55% 100% at 50% 100%);
        }
        header h1 {
            font-size: 1.3em;
            font-weight: 800;
            background: linear-gradient(90deg, #4fc3f7, #81d4fa, #e0f7fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header .subtitle {
            font-size: 0.75em;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .cam {
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(165deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            overflow: hidden;
            backdrop-filter: blur(4px);
        }
        .cam.cam-full {
            grid-column: 1 / -1;
        }
        .cam-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
        }
        .cam-title {
            font-size: 0.78em;
            font-weight: 700;
        }
        .cam-badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.55em;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(239,83,80,0.25);
            color: #ef5350;
        }
        .cam-embed {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            display: block;
            background: #000;
        }
        .cam-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.06) 100%);
            text-decoration: none;
            color: #fff;
            transition: background 0.3s;
        }
        .cam-link:hover {
            background: linear-gradient(135deg, rgba(79,195,247,0.08) 0%, rgba(79,195,247,0.12) 100%);
        }
        .cam-link-icon {
            font-size: 2.5em;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
        }
        .cam-link-text {
            text-align: left;
        }
        .cam-link-text .cam-link-name {
            font-size: 1em;
            font-weight: 700;
        }
        .cam-link-text .cam-link-desc {
            font-size: 0.7em;
            color: rgba(255,255,255,0.45);
            margin-top: 2px;
        }

        footer {
            text-align: center;
            padding: 16px;
            color: rgba(255,255,255,0.15);
            font-size: 0.6em;
        }

        @media (max-width: 600px) {
            main {
                grid-template-columns: 1fr;
                padding: 10px;
                gap: 10px;
            }
            .cam.cam-full {
                grid-column: 1;
            }
            header { padding: 16px 12px 12px; }
            header h1 { font-size: 1.1em; }
        }
    </style>
</head>
<body>

<a class="back-link" href="index.html">&larr; Tornar</a>

<header>
    <h1>&#128247; Webcams en directe</h1>
    <div class="subtitle">Club Nàutic Sitges</div>
</header>

<main>

    <!-- YOUTUBE - Vista S/SE (embed funciona) -->
    <div class="cam cam-full">
        <div class="cam-header">
            <span class="cam-title">Vista S/SE - Des de l'Església</span>
            <span class="cam-badge">&#9679; En directe</span>
        </div>
        <iframe
            class="cam-embed"
            src="https://www.youtube.com/embed/lTH4PI3z3rg?autoplay=1&mute=1"
            title="Webcam Església Sitges"
            allow="accelerometer; autoplay; encrypted-media; gyroscope"
            allowfullscreen
        ></iframe>
    </div>

    <!-- NEST - Webcam Nàutic (no permet embed, link) -->
    <div class="cam">
        <div class="cam-header">
            <span class="cam-title">Webcam Nàutic</span>
            <span class="cam-badge">&#9679; En directe</span>
        </div>
        <a class="cam-link" href="https://video.nest.com/live/rRaPmgiwSf">
            <span class="cam-link-icon">&#128247;</span>
            <div class="cam-link-text">
                <div class="cam-link-name">Obrir webcam</div>
                <div class="cam-link-desc">Platja del club - Nest cam</div>
            </div>
        </a>
    </div>

    <!-- CALIPOLIS - Vista Llevant (no permet embed, link) -->
    <div class="cam">
        <div class="cam-header">
            <span class="cam-title">Vista Llevant</span>
            <span class="cam-badge">&#9679; En directe</span>
        </div>
        <a class="cam-link" href="https://www.hotelcalipolis.com/#webcam">
            <span class="cam-link-icon">&#127961;</span>
            <div class="cam-link-text">
                <div class="cam-link-name">Obrir webcam</div>
                <div class="cam-link-desc">Des del Calipolis</div>
            </div>
        </a>
    </div>

</main>

<footer>CNS Vela Lleugera &middot; Sitges</footer>

</body>
</html>
